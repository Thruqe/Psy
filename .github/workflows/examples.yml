name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Build release
      run: cargo build --release --verbose
    
    - name: Run tests
      run: |
        chmod +x scripts/run_tests.bash
        ./scripts/run_tests.bash